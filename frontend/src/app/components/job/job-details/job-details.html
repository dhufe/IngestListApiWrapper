<div class="container">
  <h1>Jobdetails:</h1>
  <form (keyup.enter)="updateHost()">
    <div class="row">
      <div class="col-12">
        <mat-form-field appearance="outline">
          <mat-label>Job-ID</mat-label>
          <input matInput id="jobid" type="text" readonly="true" placeholder="jobid" name="jobid" [(ngModel)]="job.id">
        </mat-form-field>
      </div>
    </div>
    <div class="row">
      <div class="col-12">
        <mat-form-field appearance="outline">
          <mat-label>Dateipfad</mat-label>
          <input matInput id="jobfilename" readonly="true" type="text" placeholder="Dateipfad" name="jobfilename" [(ngModel)]="job.filename">
        </mat-form-field>
      </div>
    </div>
    <div class="row">
      <div class="col-12">
        <mat-form-field appearance="outline">
          <mat-label>Typ</mat-label>
          <input matInput id="jobtype" readonly="true" type="text" placeholder="Dateipfad" name="jobtype" [(ngModel)]="job.type">
        </mat-form-field>
      </div>
    </div>
    <div class="row">
      <div class="col-12">
        <mat-form-field appearance="outline">
          <mat-label>Status</mat-label>
          <input matInput readonly="true" id="jobstatus" type="text" placeholder="Status" name="jobstatus" [(ngModel)]="job.status">
        </mat-form-field>
      </div>
    </div>
    <div class="row">
      <div class="col-12">
        <mat-form-field appearance="outline">
          <mat-label>Ausgabe</mat-label>
          <textarea matInput id="joboutput" type="text" placeholder="Ausgabe" name="joboutput" [(ngModel)]="job.output" rows="5"></textarea>
        </mat-form-field>
      </div>
    </div>
    <div class="row">
      <div class="col-12">
        <mat-form-field appearance="outline">
          <mat-label>Fehlerausgabe</mat-label>
          <textarea matInput id="joberror" readonly="true" type="text" placeholder="Fehler" name="joberror" [(ngModel)]="job.error" rows="5"></textarea>
        </mat-form-field>
      </div>
    </div>
  </form>
</div>

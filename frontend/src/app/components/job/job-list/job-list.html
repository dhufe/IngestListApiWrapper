<mat-form-field>
  <mat-label>Filter</mat-label>
  <input matInput (keyup)="applyFilter($event)" placeholder="Pending" #input>
</mat-form-field>

<div class="container">
  <table mat-table [dataSource]="dataSource" class="mat-elevation-z8" matSort
         (matSortChange)="announceSortChange($event)">

    <!-- ID Column -->
    <ng-container matColumnDef="Id">
      <th mat-header-cell *matHeaderCellDef> Id</th>
      <td mat-cell *matCellDef="let element"> {{ element.id }}</td>
    </ng-container>

    <!-- FileName Column -->
    <ng-container matColumnDef="FileName">
      <th mat-header-cell *matHeaderCellDef> Dateiname</th>
      <td mat-cell *matCellDef="let element"> {{ element.filename }}</td>
    </ng-container>

    <!-- Type Column -->
    <ng-container matColumnDef="Type">
      <th mat-header-cell *matHeaderCellDef> Typ</th>
      <td mat-cell *matCellDef="let element"> {{ element.type }}</td>
    </ng-container>

    <!-- Status Column -->
    <ng-container matColumnDef="Status">
      <th mat-header-cell *matHeaderCellDef> Status</th>
      <td mat-cell *matCellDef="let element">
        <!-- {{element.status}} -->
        <div class="float-end">
          @switch (element.status) {
            @case ("Failed") {
              <mat-icon aria-hidden="false" fontIcon="error"></mat-icon>
            }
            @case ("Completed") {
              <mat-icon aria-hidden="false" fontIcon="check_circle"></mat-icon>
            }
            @case ("Running") {
              <mat-icon aria-hidden="false" fontIcon="start"></mat-icon>
            }
            @case ("Pending") {
              <mat-icon aria-hidden="false" fontIcon="pending"></mat-icon>
            }
            @default {
              {{ element.status }}
            }
          }
        </div>
      </td>
    </ng-container>

    <!-- Aktion column -->
    <ng-container matColumnDef="Aktion">
      <th mat-header-cell *matHeaderCellDef></th>
      <td mat-cell *matCellDef="let element">
        <div class="float-end">
          <button mat-button (click)="openDetails(element)" title="details">
            <mat-icon aria-hidden="false" fontIcon="more_vert"></mat-icon>
          </button>
          <button mat-button routerLink="editJob/{{element.id}}" title="editieren">
            <mat-icon aria-hidden="false" fontIcon="edit"></mat-icon>
          </button>
        </div>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

    <!-- Row shown when there is no matching data. -->
    <tr class="mat-row" *matNoDataRow>
      <td class="mat-cell" colspan="4">No data matching the filter "{{ input.value }}"</td>
    </tr>

  </table>
  <div class="mt-1 d-flex justify-content-end">
    <mat-paginator [pageSizeOptions]="[5, 10, 25, 100]" aria-label="Select page of users"></mat-paginator>
  </div>
</div>

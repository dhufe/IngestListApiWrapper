stages:
  - prep
  - test
  - build
  - clean

variables:
  REGISTRY: '$CI_REGISTRY/daniel/IngestListApiWrapper'


prepare-env-job:
  stage: prep
  image: alpine:3.22

  script:
    # install tools we need to build our toolchain
    - apk add --no-cache git bash python3 py3-pip curl grep
    - chmod +x scripts/prepsrc.sh
    # run build script for download tool
    - bash scripts/prepsrc.sh


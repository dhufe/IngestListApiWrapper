stages:
  - lint
  - prep
  - build

variables:
  INGESTLIST_RELEASE: '7.2.0'
  REGISTRY:           'default-route-openshift-image-registry.apps.kubecluster.blha.mwfk.ad.lvnbb.de'


workflow:
  rules:
    - if: $CI_SERVER_HOST == "gitlab.la-bw.de"
      variables:
        REGISTRY:             'default-route-openshift-image-registry.apps.kubecluster.blha.mwfk.ad.lvnbb.de/dimag'
        CI_REGISTRY_USER:     $PODMAN_USER
        CI_REGISTRY_PASSWORD: $PODMAN_PASS
    - if: $CI_SERVER_HOST != "gitlab.la-bw.de"
      variables:
        REGISTRY:             '$CI_REGISTRY/dimag/ingestlistapiwrapper'

cache:
  paths:
    - ${CI_PROJECT_DIR}/sources/


include:
  - backend/.gitlab-ci.yml
  - frontend/.gitlab-ci.yml


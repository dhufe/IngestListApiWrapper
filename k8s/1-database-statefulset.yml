apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: ilwrapper-psql-ss
  namespace: ilwrapper
  labels:
    app: ilwrapper-psql
spec:
  replicas: 1
  serviceName: ilwrapper-psql
  selector:
    matchLabels:
      app: ilwrapper-psql
  template:
    metadata:
      labels:
        app: ilwrapper-psql
    spec:
      containers:
        - name: postgres-database
          image: docker.io/postgres:17.4-alpine
          env:
            - name: TZ
              value: "Europe/Berlin"
          envFrom:
            - secretRef:
                name: ilwrapper-psql-secret
          ports:
            - name: databaseport
              containerPort: 5432
---
kind: Service
apiVersion: v1
metadata:
  namespace: ilwrapper
  name: ilwrapper-postgres-svc
spec:
  selector:
    app: ilwrapper-psql
  ports:
    - name: databaseport
      port: 5432
      protocol: TCP
      targetPort: 5432
      nodePort: 30272
  type: LoadBalancer


apiVersion: v1
kind: ConfigMap
metadata:
  annotations:
  name: ilwrapper-config
  namespace: ilwrapper
data:
  config.yml: |
    server:
      port: "8080"
      host: localhost
    database:
      driver: sqlite
      dsn: tasks.db
      max_open: 10
      max_idle: 5
    task_scheduler:
      interval: '*/30 * * * * *'
      file_storage_path: data
      max_workers: 3
    security:
      secret_key: your-secret-key
